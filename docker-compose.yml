version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: hearthealth-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: hearthealth

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hearthealth-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/hearthealth
      - JWT_SECRET=your_super_secret_jwt_key_change_in_production
      - PYTHON_SERVICE_URL=http://python-service:8000
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - mongodb
      - python-service

  python-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: hearthealth-rppg
    restart: unless-stopped
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hearthealth-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
      - REACT_APP_SOCKET_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  mongo_data:
